{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Remove Entries</h2>
  <form method="get" class="stack compact admin-search">
    <label>Entry Type
      <select name="kind">
        <option value="alter" {% if kind == 'alter' %}selected{% endif %}>Alter</option>
        <option value="location" {% if kind == 'location' %}selected{% endif %}>Location</option>
        <option value="affiliation" {% if kind == 'affiliation' %}selected{% endif %}>Affiliation</option>
        <option value="document" {% if kind == 'document' %}selected{% endif %}>Document</option>
      </select>
    </label>
    <label>Search<input name="q" value="{{ query }}" placeholder="Search by name or ID"></label>
    <button class="primary">Search</button>
  </form>

  <div class="stack compact top-gap">
    {% for entry_id, name in results %}
    <form method="post" class="entry-admin-row">
      <input type="hidden" name="kind" value="{{ kind }}">
      <input type="hidden" name="entry_id" value="{{ entry_id }}">
      <input type="hidden" name="q" value="{{ query }}">
      <div class="entry-admin-meta">
        <strong>{{ name }}</strong>
        <span>{{ entry_id }}</span>
      </div>
      <button class="danger-button">Remove</button>
    </form>
    {% else %}
    <p class="muted">No matching entries found.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
